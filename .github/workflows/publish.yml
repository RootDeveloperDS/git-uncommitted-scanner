name: Upload Python Package to PyPI

# This pipeline ONLY runs when you publish a new Release on GitHub
on:
  release:
    types: [published]

jobs:
  pypi-publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    
    # CRITICAL: This grants GitHub the permission to request the OIDC token
    permissions:
      id-token: write 
      contents: read
      
    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        
    - name: Install build tools
      run: python -m pip install --upgrade pip build
      
    - name: Build standard distribution archives
      run: python -m build
      
    - name: Publish package to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
